<!DOCTYPE html>


<html lang="{{= it.variables.language }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=0.7">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@Ziphil">
    <meta property="og:url" content="{{= it.environments.configs.getRemoteUrl(it.variables.path, it.variables.language) }}">
    <meta property="og:title" content="{{= it.variables.ogpTitle }}">
    <meta property="og:description" content="{{= it.variables.ogpDescription }}">
    <meta property="og:image" content="{{= it.environments.configs.getRemoteDomain(it.variables.language) + it.variables.opgImagePath }}">
    <link rel="icon" href="{{= it.environments.configs.getRemoteDomain(it.variables.language) + it.variables.ogpImagePath }}">
{{= it.variables.headNode?.toString() }}
    <link rel="stylesheet" href="https://kit.fontawesome.com/5081c7f16b.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/style/1.css">
    <script src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9429549748934508" crossorigin="anonymous" async></script>
    <title>{{= it.variables.title }}</title>
  </head>
  <body data-scheme="{{= it.variables.scheme }}">

    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <a class="header-title" href="/{{= it.variables.scheme }}/" data-scheme="{{= it.variables.scheme }}">
            {{= it.variables.titleNode?.toString() }}
          </a>
        </div>
        <div class="header-right">
          {{= it.variables.linkNode?.toString() }}
        </div>
      </div>
    </header>

    <nav class="navigation">
      <div class="navigation-inner">
{{= it.variables.navigationNode?.toString() }}
      </div>
    </nav>

    <aside class="ad">
      <div class="ad-inner" align="center">
        <ins class="adsbygoogle" style="display:block;width:100%;height:90px;" data-ad-client="ca-pub-9429549748934508" data-ad-slot="8515086829"></ins>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </div>
    </aside>

{{= it.document.toString() }}

{{= it.variables.footerNode?.toString() }}

  </body>
</html>
